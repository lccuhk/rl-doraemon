  <text x="40" y="615" fill="#cbd5e1" font-family="monospace" font-size="11">• 学习率: 0.0001</text>
  <text x="40" y="635" fill="#cbd5e1" font-family="monospace" font-size="11">• γ (折扣因子): 0.99</text>
  <text x="40" y="655" fill="#cbd5e1" font-family="monospace" font-size="11">• 经验回放: 100,000</text>
  <text x="200" y="615" fill="#cbd5e1" font-family="monospace" font-size="11">• 目标更新: 每 100 步</text>
  <text x="200" y="635" fill="#cbd5e1" font-family="monospace" font-size="11">• Batch Size: 64</text>
  <text x="200" y="655" fill="#cbd5e1" font-family="monospace" font-size="11">• 优化器: Adam</text>
  
